# H6 experiment task set
#
# 10 tasks across 5 types. Ground truth is FROZEN (verified against the pinned
# ripgrep fixture at commit dfe4a81d...). Line numbers are 1-indexed, inclusive.
#
# type:
#   A = pure structure   (LSP-strong baseline floor)
#   B = pure semantic    (RAG-strong baseline floor)
#   C = structure+semantic combo (H6 gap)
#   D = dependency context, multi-symbol (H6 gap)
#   E = precise loc slicing (astimate strength)
#
# Each [[task.expected]] = one symbol the verified answer must identify.
# Accuracy = all expected symbols matched (by addr) AND loc overlap >= 50%.

[[task]]
id = "A1"
type = "A"
question = "Where is the `WalkBuilder` struct defined, and what is the exact signature of the method that builds a *parallel* directory walker? Give the struct location and the method signature."

  [[task.expected]]
  symbol = "ignore::walk::WalkBuilder"
  file = "ripgrep_crates/ignore/src/walk.rs"
  loc = [483, 507]
  kind = "struct"

  [[task.expected]]
  symbol = "ignore::walk::WalkBuilder::build_parallel"
  file = "ripgrep_crates/ignore/src/walk.rs"
  loc = [625, 642]
  kind = "fn"

